; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra script storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3]
platform = espressif32@6.10.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; ── Board is ESP32-S3-DevKitC-1 N16R8: 16MB QIO flash + 8MB Octal (OPI) PSRAM.
;    The stock board def defaults to 8MB/no-PSRAM (that's the label PlatformIO
;    prints); these overrides are what actually get built. ──
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi   ; QIO flash + OPI PSRAM
board_build.psram_type = opi
board_build.partitions = partitions.csv
build_flags =
			-DBOARD_HAS_PSRAM
			-DUSE_ESP32=1
			-DCORE_DEBUG_LEVEL=3
			-I"${thisdir}/src"
			; ── TFT_eSPI config via build flags (from TFT_CONFIG/User_Setup.h).
			;    USER_SETUP_LOADED makes the library IGNORE its own User_Setup.h,
			;    so this survives a fresh .pio / new machine. ──
			-DUSER_SETUP_LOADED=1
			-DILI9488_DRIVER=1
			-DTFT_CS=5
			-DTFT_DC=6
			-DTFT_RST=7
			-DTFT_MOSI=9
			-DTFT_MISO=-1
			-DTFT_SCLK=4
			-DUSE_HSPI_PORT=1
			-DSPI_FREQUENCY=55000000
			-DSPI_READ_FREQUENCY=27000000
			-DLOAD_GLCD=1
			-DLOAD_FONT2=1
			-DLOAD_FONT4=1
			-DLOAD_GFXFF=1
			-DTFT_RGB_ORDER=TFT_RGB
			-DDISABLE_ALL_LIBRARY_WARNINGS=1
lib_deps =
			miguelbalboa/MFRC522@^1.4.10
			bblanchon/ArduinoJson@^7.4.1
			; MP3 decode + I2S output for MAX98357A speaker
			earlephilhower/ESP8266Audio@^1.9.7
			; TFT_eSPI - using latest master with ESP32-S3 Arduino core > 2.0.14 fix
			https://github.com/Bodmer/TFT_eSPI.git#master
